<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forge — Text to Image</title>
<style>
  :root{
    --ink:#0a0a0b; --panel:#141416; --line:#26262a;
    --paper:#ece7df; --muted:#8a857c; --gold:#c9a24b; --gold-dim:#9a7d3a;
    --rad:2px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--ink);color:var(--paper);
    font-family:"Iowan Old Style",Georgia,serif;
    min-height:100vh;display:flex;flex-direction:column;
  }
  header{
    border-bottom:1px solid var(--line);padding:22px 30px;
    display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:10px;
  }
  .brand{font-size:13px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);font-family:"JetBrains Mono",ui-monospace,monospace}
  .brand b{color:var(--paper);font-weight:400}
  .tag{font-size:12px;color:var(--muted);font-family:"JetBrains Mono",ui-monospace,monospace}
  main{flex:1;display:grid;grid-template-columns:380px 1fr;gap:0}
  @media(max-width:820px){main{grid-template-columns:1fr}}
  .controls{
    border-right:1px solid var(--line);padding:28px 30px;display:flex;flex-direction:column;gap:22px;
  }
  @media(max-width:820px){.controls{border-right:none;border-bottom:1px solid var(--line)}}
  label{display:block;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:9px;font-family:"JetBrains Mono",ui-monospace,monospace}
  textarea,input,select{
    width:100%;background:var(--panel);border:1px solid var(--line);color:var(--paper);
    padding:12px 13px;border-radius:var(--rad);font-family:inherit;font-size:15px;resize:vertical;
  }
  textarea:focus,input:focus,select:focus{outline:none;border-color:var(--gold-dim)}
  textarea{min-height:120px;line-height:1.5}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .btn{
    background:var(--gold);color:#1a1408;border:none;padding:15px;border-radius:var(--rad);
    font-family:"JetBrains Mono",ui-monospace,monospace;font-size:13px;letter-spacing:.16em;text-transform:uppercase;
    cursor:pointer;transition:background .15s;font-weight:600;
  }
  .btn:hover:not(:disabled){background:#dcb55c}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .stage{padding:30px;display:flex;align-items:center;justify-content:center;position:relative;flex-direction:column}
  .canvas{
    width:100%;max-width:680px;aspect-ratio:1;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--rad);
    display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;
  }
  .canvas img{width:100%;height:100%;object-fit:contain;display:block}
  .placeholder{text-align:center;color:var(--muted);padding:40px}
  .placeholder .big{font-size:46px;color:var(--line);margin-bottom:14px}
  .placeholder .small{font-size:13px;letter-spacing:.06em;font-family:"JetBrains Mono",ui-monospace,monospace}
  .spinner{
    width:34px;height:34px;border:2px solid var(--line);border-top-color:var(--gold);
    border-radius:50%;animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .status{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:11px;color:var(--muted);font-family:"JetBrains Mono",ui-monospace,monospace;letter-spacing:.08em}
  .err{color:#d98a6a;font-size:13px;line-height:1.6;font-family:"JetBrains Mono",ui-monospace,monospace}
  .actions{margin-top:16px;display:flex;gap:10px;justify-content:center}
  .ghost{background:transparent;border:1px solid var(--line);color:var(--paper);padding:10px 16px;border-radius:var(--rad);font-family:"JetBrains Mono",ui-monospace,monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none}
  .ghost:hover{border-color:var(--gold-dim)}
  .seed-row{display:flex;gap:8px}
  .seed-row input{flex:1}
  .dice{background:var(--panel);border:1px solid var(--line);color:var(--paper);width:46px;border-radius:var(--rad);cursor:pointer;font-size:18px}
  .dice:hover{border-color:var(--gold-dim)}
</style>
</head>
<body>
<header>
  <div class="brand"><b>FORGE</b> — text to image</div>
  <div class="tag">nvidia nim · flux.1</div>
</header>

<main>
  <section class="controls">
    <div>
      <label>Model</label>
      <select id="model">
        <option value="black-forest-labs/flux.1-schnell">FLUX.1 schnell — fast</option>
        <option value="black-forest-labs/flux.1-dev">FLUX.1 dev — quality</option>
        <option value="stabilityai/stable-diffusion-3.5-large">Stable Diffusion 3.5 Large</option>
      </select>
    </div>

    <div>
      <label>Prompt</label>
      <textarea id="prompt" placeholder="An olive grove at dawn in the Douro Valley, low golden light, fog in the terraces, painterly..."></textarea>
    </div>

    <div class="grid2">
      <div>
        <label>Width</label>
        <select id="width"><option>1024</option><option>1216</option><option>768</option></select>
      </div>
      <div>
        <label>Height</label>
        <select id="height"><option>1024</option><option>1216</option><option>768</option></select>
      </div>
    </div>

    <div class="grid2">
      <div>
        <label>Steps</label>
        <input type="number" id="steps" value="4" min="1" max="50">
      </div>
      <div>
        <label>CFG Scale</label>
        <input type="number" id="cfg" value="0" min="0" max="20" step="0.5">
      </div>
    </div>

    <div>
      <label>Seed</label>
      <div class="seed-row">
        <input type="number" id="seed" value="0" min="0">
        <button class="dice" id="dice" title="Random seed">⚄</button>
      </div>
    </div>

    <button class="btn" id="go">Generate</button>
  </section>

  <section class="stage">
    <div class="canvas" id="canvas">
      <div class="placeholder" id="ph">
        <div class="big">◇</div>
        <div class="small">your image appears here</div>
      </div>
    </div>
  </section>
</main>

<script>
const $ = id => document.getElementById(id);
const stepDefaults = {
  "black-forest-labs/flux.1-schnell": {steps:4, cfg:0},
  "black-forest-labs/flux.1-dev": {steps:50, cfg:3.5},
  "stabilityai/stable-diffusion-3.5-large": {steps:50, cfg:4.5}
};

$('model').addEventListener('change', e=>{
  const d = stepDefaults[e.target.value];
  if(d){ $('steps').value=d.steps; $('cfg').value=d.cfg; }
});

$('dice').addEventListener('click', ()=>{
  $('seed').value = Math.floor(Math.random()*4294967295);
});

$('go').addEventListener('click', generate);

async function generate(){
  const prompt = $('prompt').value.trim();
  if(!prompt){ return showError('Enter a prompt.'); }

  $('go').disabled = true;
  $('canvas').innerHTML = '<div class="spinner"></div><div class="status">forging — this can take 10–40s</div>';

  const payload = {
    model: $('model').value,
    prompt: prompt,
    mode: "base",
    cfg_scale: parseFloat($('cfg').value),
    width: parseInt($('width').value),
    height: parseInt($('height').value),
    seed: parseInt($('seed').value) || 0,
    steps: parseInt($('steps').value)
  };

  try{
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });

    if(!res.ok){
      let detail = res.status + ' ' + res.statusText;
      try{ const j = await res.json(); detail = (j.error || j.detail || j.message || JSON.stringify(j)); }catch(e){}
      throw new Error(detail);
    }

    const data = await res.json();
    const art = data.artifacts && data.artifacts[0];
    const b64 = art && (art.base64 || art.b64_json);
    if(!b64) throw new Error('No image returned: ' + JSON.stringify(data).slice(0,300));

    const src = 'data:image/png;base64,' + b64;
    $('canvas').innerHTML =
      '<img src="'+src+'" alt="generated">' +
      '<div class="status">seed '+payload.seed+' · '+payload.steps+' steps</div>';

    const old = document.querySelector('.stage .actions');
    if(old) old.remove();
    const wrap = document.createElement('div');
    wrap.className = 'actions';
    const dl = document.createElement('a');
    dl.className='ghost'; dl.href=src; dl.download='forge-'+payload.seed+'.png'; dl.textContent='Download';
    wrap.appendChild(dl);
    document.querySelector('.stage').appendChild(wrap);

  }catch(err){
    showError(err.message);
  }finally{
    $('go').disabled = false;
  }
}

function showError(msg){
  $('canvas').innerHTML = '<div class="placeholder"><div class="big">⚠</div><div class="err">'+msg+'</div></div>';
}
</script>
</body>
</html>
